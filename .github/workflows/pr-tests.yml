name: PR Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-tests-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test-x86:
    name: x86
    runs-on: [self-hosted, chenweis-M9-PRO]
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Test (x86)
        run: |
          cp prtos_config.x86 prtos_config
          make defconfig
          make
          bash scripts/run_test.sh --arch x86 check-all

  test-amd64:
    name: amd64
    needs: test-x86
    runs-on: [self-hosted, chenweis-M9-PRO]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Test (amd64)
        run: |
          make distclean 2>/dev/null || true
          cp prtos_config.amd64 prtos_config
          make defconfig
          make
          bash scripts/run_test.sh --arch amd64 check-all

  test-aarch64:
    name: aarch64
    needs: test-x86
    runs-on: [self-hosted, chenweis-M9-PRO]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Test (aarch64)
        run: |
          make distclean 2>/dev/null || true
          cp prtos_config.aarch64 prtos_config
          make defconfig
          make
          bash scripts/run_test.sh --arch aarch64 check-all

  test-riscv64:
    name: riscv64
    needs: test-x86
    runs-on: [self-hosted, chenweis-M9-PRO]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Test (riscv64)
        run: |
          make distclean 2>/dev/null || true
          cp prtos_config.riscv64 prtos_config
          make defconfig
          make
          bash scripts/run_test.sh --arch riscv64 check-all
